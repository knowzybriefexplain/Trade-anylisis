<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Quntra Contact</title>
    <link rel="stylesheet" href="Css/contact.css">
    <link rel="shortcut icon" href="Assets/logo3.png" type="image/x-icon">
</head>

<body>

    <!-- Navigation bar -->

    <nav class="navbar">
        <img src="Assets/logo2.png" width="130px">
        <!-- <h2 class="nav-heading" >Quntra</h2> -->
        <ul class="lists">
            <li>
                <a class="nav-links" href="index.html">Home </a>
            </li>
        </ul>
    </nav>

    <section class="wrap">

        <h1>Contact Quntra</h1>

        <p>We'd love to hear from you.</p>

        <form action="https://formspree.io/f/meebngol" id="f" method="post">

            <input id="name" placeholder="Full Name" name="full name" required>

            <input id="email" type="email" placeholder="Email" name="email">

            <input id="subject" placeholder="Subject" name="subject">

            <textarea id="msg" placeholder="Message" name="message" required></textarea>

            <button>Send Message</button>

        </form>

        <div id="ok"></div>

    </section>


    <script src="Js/contact.js"></script>

</body>

</html>
